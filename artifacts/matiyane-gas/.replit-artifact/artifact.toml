kind = "web"
previewPath = "/"
title = "Matiyane Gas Distributors"
version = "1.0.0"
id = "artifacts/matiyane-gas"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18588

[services.development]
run = "pnpm --filter @workspace/matiyane-gas run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/matiyane-gas", "run", "build" ]
publicDir = "artifacts/matiyane-gas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18588"
BASE_PATH = "/"
