openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Matiyane Gas Distributors API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: orders
    description: Gas order operations
  - name: contact
    description: Contact form operations
  - name: products
    description: Products operations
  - name: admin
    description: Admin management operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all gas products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new gas order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}/payfast:
    get:
      operationId: getOrderPayfastData
      tags: [orders]
      summary: Get PayFast payment data for an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PayFast payment form data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayfastData"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}/paystack:
    get:
      operationId: getOrderPaystackData
      tags: [orders]
      summary: Get Paystack payment data for an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Paystack payment initialization data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaystackData"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/track:
    get:
      operationId: trackOrder
      tags: [orders]
      summary: Track an order by reference number
      parameters:
        - name: ref
          in: query
          required: true
          schema:
            type: string
          description: Order reference (e.g. MGD-XXXXX-XXXX)
      responses:
        "200":
          description: Order tracking details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackOrderResult"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/summary:
    get:
      operationId: getOrderSummary
      tags: [orders]
      summary: Get order statistics summary
      responses:
        "200":
          description: Order summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderSummary"

  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "200":
          description: Contact form submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login with password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "401":
          description: Invalid password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/orders:
    get:
      operationId: adminListOrders
      tags: [admin]
      summary: List all orders (admin)
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOrdersResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/orders/{id}/status:
    patch:
      operationId: adminUpdateOrderStatus
      tags: [admin]
      summary: Update order status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Order updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/contacts:
    get:
      operationId: adminListContacts
      tags: [admin]
      summary: List all contact messages (admin)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of contact messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminContactsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/analytics:
    get:
      operationId: adminGetAnalytics
      tags: [admin]
      summary: Get order volume and revenue analytics (admin)
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d]
            default: 30d
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAnalyticsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
        unit:
          type: string
        inStock:
          type: boolean
      required:
        - id
        - name
        - description
        - price
        - unit
        - inStock

    OrderItem:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        subtotal:
          type: number
      required:
        - productId
        - productName
        - quantity
        - unitPrice
        - subtotal

    OrderInput:
      type: object
      properties:
        fullName:
          type: string
        phone:
          type: string
        email:
          type: string
        deliveryAddress:
          type: string
        suburb:
          type: string
        specialInstructions:
          type: ["string", "null"]
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: integer
              quantity:
                type: integer
            required:
              - productId
              - quantity
      required:
        - fullName
        - phone
        - email
        - deliveryAddress
        - suburb
        - items

    TrackOrderResult:
      type: object
      properties:
        orderRef:
          type: string
        status:
          type: string
        totalAmount:
          type: number
        createdAt:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
      required:
        - orderRef
        - status
        - totalAmount
        - createdAt
        - items

    Order:
      type: object
      properties:
        id:
          type: integer
        orderRef:
          type: string
        fullName:
          type: string
        phone:
          type: string
        email:
          type: string
        deliveryAddress:
          type: string
        suburb:
          type: string
        specialInstructions:
          type: ["string", "null"]
        status:
          type: string
        totalAmount:
          type: number
        deliveryFee:
          type: number
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
      required:
        - id
        - orderRef
        - fullName
        - phone
        - email
        - deliveryAddress
        - suburb
        - status
        - totalAmount
        - deliveryFee
        - items
        - createdAt

    PayfastData:
      type: object
      properties:
        merchantId:
          type: string
        merchantKey:
          type: string
        returnUrl:
          type: string
        cancelUrl:
          type: string
        notifyUrl:
          type: string
        nameFirst:
          type: string
        emailAddress:
          type: string
        mPaymentId:
          type: string
        amount:
          type: string
        itemName:
          type: string
        payfastUrl:
          type: string
      required:
        - merchantId
        - merchantKey
        - returnUrl
        - cancelUrl
        - notifyUrl
        - nameFirst
        - emailAddress
        - mPaymentId
        - amount
        - itemName
        - payfastUrl

    PaystackData:
      type: object
      properties:
        publicKey:
          type: string
        email:
          type: string
        amountKobo:
          type: integer
        reference:
          type: string
        currency:
          type: string
        callbackUrl:
          type: string
        metadata:
          type: object
          properties:
            orderRef:
              type: string
            customerName:
              type: string
      required:
        - publicKey
        - email
        - amountKobo
        - reference
        - currency
        - callbackUrl

    OrderSummary:
      type: object
      properties:
        totalOrders:
          type: integer
        pendingOrders:
          type: integer
        completedOrders:
          type: integer
        totalRevenue:
          type: number
      required:
        - totalOrders
        - pendingOrders
        - completedOrders
        - totalRevenue

    ContactInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        message:
          type: string
      required:
        - name
        - email
        - message

    AdminLoginInput:
      type: object
      properties:
        password:
          type: string
      required:
        - password

    AdminLoginResponse:
      type: object
      properties:
        token:
          type: string
      required:
        - token

    AdminOrdersResponse:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required:
        - orders
        - total
        - page
        - totalPages

    AdminContactsResponse:
      type: object
      properties:
        contacts:
          type: array
          items:
            $ref: "#/components/schemas/ContactMessage"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required:
        - contacts
        - total
        - page
        - totalPages

    ContactMessage:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        message:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - email
        - message
        - createdAt

    AdminAnalyticsResponse:
      type: object
      properties:
        period:
          type: string
        dailyData:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              orders:
                type: integer
              revenue:
                type: number
            required:
              - date
              - orders
              - revenue
      required:
        - period
        - dailyData

    OrderStatusUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, out_for_delivery, delivered, paid, cancelled]
      required:
        - status

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
